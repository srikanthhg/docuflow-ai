# private load balancer
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ai-gateway-private
  # namespace: default
spec:
  gatewayClassName: nginx
  infrastructure:
    annotations:
      service.beta.kubernetes.io/azure-load-balancer-internal: "true"
      service.beta.kubernetes.io/azure-load-balancer-ipv4: ""
  listeners:
    # - name: https-listener
    #   protocol: HTTPS
    #   port: 443
    #   hostname: "*.docuflow.internal"
    #   allowedRoutes:
    #     namespaces:
    #       from: Same # or All or Selector
    
    - name: pg-tcp-listener
      protocol: TCP
      port: 5432
      # Note: No hostname is specified because TCP is Layer 4
      allowedRoutes:
        namespaces:
          from: All
        kinds:
          - kind: TCPRoute
    - name: http
      protocol: HTTP
      port: 80
      # hostname: "*.docuflow.internal"
      hostname: "*.skanth.test"
      allowedRoutes:
        namespaces:
          from: Same # or All or Selector

      # tls:
      #   mode: Terminate
      #   certificateRefs:
      #     - name: chat-app-tls
      #       kind: Secret
      #       group: ""