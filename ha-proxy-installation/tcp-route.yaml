apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: postgres-tcp-route
  namespace: default
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ai-gateway-private
      sectionName: pg-tcp-listener
  rules:
    - backendRefs:
        - group: ''
          kind: Service
          name: ha-proxy-haproxy # Exact name of your HAProxy ClusterIP Service
          port: 8080