apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ha-proxy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/replicas
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: haproxy
    targetRevision: 4.0.7
    helm:
      values: |
        containerPorts:
          - name: postgres
            containerPort: 5432
            protocol: TCP

        service:
          type: LoadBalancer
          annotations:
            service.beta.kubernetes.io/azure-load-balancer-internal: "true"
          ports:
            - port: 5432
              targetPort: 5432
              name: postgres

        replicaCount: 2

        resources:
          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 500m
            memory: 512Mi
          
        pdb:
          minAvailable: 1

        configuration: |
          global
            log stdout format raw local0
            maxconn 1024
          defaults
            mode tcp
            log global
            retries 3
            timeout client 5m
            timeout connect 30s
            timeout server 5m
            option tcplog
          frontend postgres
            bind *:5432
            default_backend postgres_backend
          backend postgres_backend
            mode tcp # added
            option tcp-check
            default-server inter 5s fall 3 rise 2
            # server postgres test-server-pgsql.postgres.database.azure.com:5432 check
            server postgres test-server-pgsql.postgres.database.azure.com:5432 ssl verify none sni str(test-server-pgsql.postgres.database.azure.com) check check-ssl check-sni str(test-server-pgsql.postgres.database.azure.com)  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true # Better for CRDs


                             
