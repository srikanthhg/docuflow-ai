apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingestion-service
  namespace: argocd
spec:
  project: default
  source:
    helm:
      parameters:
        - name: serviceAccount.annotations.azure\.workload\.identity/client-id
          value: "7da70023-fd3f-4bf1-8900-4a5606aa5963"
        - name: env.AZURE_STORAGE_BLOB_URL
          value: "https://docuflowaistracc.blob.core.windows.net"
        - name: env.AZURE_STORAGE_CONTAINER
          value: "doc-uploads"
        - name: env.SERVICEBUS_FQDN
          value: ""
        - name: env.SERVICEBUS_QUEUE
          value: ""
    repoURL: https://github.com/srikanthhg/docuflow-ai.git
    targetRevision: main
    path: charts/ingestion-service
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true